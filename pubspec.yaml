name: gradelvpn
description: GradelVPN — клиент VLESS/V2Ray с поддержкой подписок от Telegram-бота.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_v2ray_client: ^3.4.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
